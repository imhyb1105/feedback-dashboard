<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>反馈管理后台</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f6f3f0;--card:#fefcf9;--text:#2c2a27;--text2:#6b6560;--text3:#9e9790;--accent:#1a3a5c;--green:#3d6b4f;--amber:#8b6914;--red:#9b3c3c;--border:#e8e4e0;--radius:10px;--font:'Outfit','PingFang SC','Microsoft YaHei',sans-serif}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.container{max-width:1100px;margin:0 auto;padding:16px 20px 40px}
h1{font-size:1.4rem;font-weight:700;letter-spacing:-0.02em}
h2{font-size:1.1rem;font-weight:600;margin-bottom:12px}

.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100dvh}
.login-card{background:var(--card);border-radius:var(--radius);padding:36px 28px;max-width:360px;width:100%;box-shadow:0 1px 3px rgba(44,42,39,0.06);text-align:center}
.login-card h1{margin-bottom:6px}
.login-card p{margin-bottom:18px;color:var(--text2);font-size:.9rem}
.login-card input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:1rem;font-family:inherit;text-align:center}
.login-card button{margin-top:12px;width:100%;padding:10px;background:var(--accent);color:#fff;border:0;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
.login-card button:hover{opacity:.9}
.login-card .err{margin-top:10px;font-size:.85rem;color:var(--red)}

.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.header .logout{background:0;border:1px solid var(--border);padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:.85rem;color:var(--text2)}
.header .logout:hover{background:#f0ece8}

.tabs{display:flex;gap:4px;margin-bottom:16px}
.tabs button{padding:8px 18px;border:1px solid var(--border);border-radius:8px 8px 0 0;background:var(--card);cursor:pointer;font-family:inherit;font-size:.9rem;color:var(--text2);border-bottom:0}
.tabs button.active{background:var(--accent);color:#fff;border-color:var(--accent)}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.card{background:var(--card);border-radius:var(--radius);padding:16px 18px;box-shadow:0 1px 3px rgba(44,42,39,0.04)}
.card .name{font-size:.8rem;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.card .value{font-size:1.8rem;font-weight:700;margin-top:2px}
.card .sub{font-size:.75rem;color:var(--text3);margin-top:2px}

.toolbar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.toolbar select,.toolbar input{padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:.85rem;background:var(--card)}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border)}
th{background:var(--card);font-weight:600;color:var(--text2);font-size:.8rem;position:sticky;top:0}
tr:hover td{background:#faf9f7}
.status{display:inline-block;padding:2px 8px;border-radius:10px;font-size:.75rem;font-weight:600}
.status.open{background:#eef6f0;color:var(--green)}
.status.in_progress{background:#fdf7ec;color:var(--amber)}
.status.resolved{background:#eef3f8;color:var(--accent)}
.status.closed{background:#f5f5f5;color:var(--text3)}
.reply-btn{font-size:.75rem;padding:2px 8px;border-radius:4px;border:1px solid var(--border);cursor:pointer;font-family:inherit;background:var(--card);margin-right:4px}
.reply-btn:hover{background:#f0ece8}

.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.35);display:none;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#fff;border-radius:var(--radius);padding:22px;max-width:460px;width:92%}
.modal-box h3{margin-bottom:12px}
.modal-box textarea{width:100%;min-height:100px;padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:.9rem;resize:vertical}
.modal-box .btns{display:flex;gap:8px;justify-content:flex-end;margin-top:12px}
.modal-box button{padding:7px 16px;border-radius:6px;border:0;cursor:pointer;font-family:inherit;font-size:.88rem;font-weight:600}
.modal-box .btn-save{background:var(--accent);color:#fff}
.modal-box .btn-cancel{background:#eee;color:#555}

.chart-wrap{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:20px}
.chart-bars{display:flex;align-items:flex-end;gap:4px;height:180px;padding:0 8px}
.chart-bar{flex:1;background:var(--accent);border-radius:4px 4px 0 0;min-width:8px;position:relative;cursor:pointer;transition:opacity .2s}
.chart-bar:hover{opacity:.8}
.chart-labels{display:flex;gap:4px;padding:6px 8px 0}
.chart-label{flex:1;font-size:.65rem;color:var(--text3);text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:3px 8px;border-radius:4px;font-size:.7rem;white-space:nowrap;pointer-events:none;opacity:0;margin-bottom:4px}
.chart-bar:hover .tooltip{opacity:1}

.hidden{display:none!important}
.empty{text-align:center;padding:40px;color:var(--text3)}
.loading{text-align:center;padding:20px;color:var(--text3)}
.error-banner{display:none;align-items:center;gap:10px;padding:10px 16px;margin-bottom:16px;background:#fef2f2;border:1px solid #fecaca;border-radius:8px;font-size:.85rem;color:var(--red)}
.error-banner.show{display:flex}
.error-banner .err-msg{flex:1}
.error-banner .err-retry{color:var(--accent);cursor:pointer;text-decoration:underline;white-space:nowrap;font-weight:600}
.card.error{border:1px solid #fecaca;background:#fffbfb}
.card.error .value{color:var(--red);font-size:1rem}
.skel{display:inline-block;background:linear-gradient(90deg,#e8e3de 25%,#f0ece8 50%,#e8e3de 75%);background-size:200% 100%;animation:skel-shim 1.5s infinite;border-radius:4px;vertical-align:middle}
@keyframes skel-shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* Analytics */
.hbar-wrap{margin-bottom:14px}
.hbar-wrap .title{font-size:.82rem;font-weight:600;color:var(--text2);margin-bottom:8px}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.hbar-label{width:130px;font-size:.75rem;color:var(--text2);text-align:right;flex-shrink:0}
.hbar-track{flex:1;height:22px;background:#f0ece8;border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding-left:6px;font-size:.7rem;color:#fff;font-weight:600;min-width:0;transition:width .5s ease}
.hbar-num{width:50px;font-size:.75rem;color:var(--text3);flex-shrink:0}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.legend-item{display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--text2)}
.legend-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}

/* Funnel */
.funnel{margin-bottom:16px}
.funnel-step{display:flex;align-items:center;margin-bottom:6px}
.funnel-label{width:130px;font-size:.75rem;color:var(--text2);text-align:right;flex-shrink:0;margin-right:8px}
.funnel-bar-wrap{flex:1;display:flex;align-items:center;gap:8px}
.funnel-bar{height:30px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:600;color:#fff;min-width:40px;transition:width .5s ease}
.funnel-rate{font-size:.72rem;color:var(--text3);white-space:nowrap;margin:0 4px 6px 138px}
.funnel-rate span{color:var(--text2);font-weight:600}

/* Daily grouped bars */
.day-group{display:flex;align-items:flex-end;gap:2px;min-width:0}
.day-group .evt-bar{flex:1;min-width:6px;border-radius:3px 3px 0 0;position:relative;cursor:pointer}
.day-group .evt-bar:hover{opacity:.75}
.day-label{font-size:.65rem;color:var(--text3);text-align:center;margin-top:4px}
.bar-tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:2px 6px;border-radius:3px;font-size:.65rem;white-space:nowrap;pointer-events:none;opacity:0;margin-bottom:2px}
.day-group .evt-bar:hover .bar-tooltip{opacity:1}

/* Insights */
.insights-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.insight-card{background:#f9f7f4;border-radius:8px;padding:12px 14px;text-align:center}
.insight-card .i-val{font-size:1.4rem;font-weight:700}
.insight-card .i-label{font-size:.7rem;color:var(--text3);margin-top:2px}
.insight-card .i-detail{font-size:.68rem;color:var(--text2);margin-top:2px}
</style>
</head>
<body>

<!-- Login -->
<div id="login-page" class="login-wrap">
<div class="login-card">
<h1>反馈管理后台</h1>
<p>输入管理密码</p>
<input type="password" id="login-pwd" placeholder="请输入密码" autocomplete="off">
<button id="login-btn">进入后台</button>
<div id="login-msg" class="err"></div>
</div>
</div>

<!-- Main -->
<div id="main-page" class="hidden">
<div class="container">
<div class="header">
<h1>反馈管理后台</h1>
<button class="logout" id="logout-btn">退出</button>
</div>

<div class="error-banner" id="error-banner"><span class="err-msg" id="err-msg"></span><span class="err-retry" id="err-retry">重试</span></div>

<div class="tabs">
<button class="active" data-tab="overview">概览</button>
<button data-tab="feedbacks">反馈列表</button>
<button data-tab="analytics">使用分析</button>
</div>

<div id="tab-overview">
<div class="cards" id="overview-cards"></div>
<div style="background:var(--card);border-radius:var(--radius);padding:18px">
<h2>最近反馈</h2>
<div id="recent-feedbacks"></div>
</div>
</div>

<div id="tab-feedbacks" class="hidden">
<div class="toolbar">
<select id="filter-project"><option value="">全部项目</option><option value="bank-rec">银行对账工具</option><option value="tax-tool">个税决策对比工具</option><option value="tax-calc">税金计算器</option><option value="fin-report">财务报表数据分析</option><option value="cn-football-sim">国足世界杯闯关模拟器</option><option value="cash-flow">现金流量表</option></select>
<select id="filter-type"><option value="">全部类型</option><option value="bug">Bug 报告</option><option value="feature">功能建议</option><option value="improvement">改进建议</option><option value="other">其他</option></select>
<select id="filter-status"><option value="">全部状态</option><option value="open">待处理</option><option value="in_progress">处理中</option><option value="resolved">已解决</option><option value="closed">已关闭</option></select>
</div>
<table>
<thead><tr><th>时间</th><th>项目</th><th>类型</th><th>标题</th><th>状态</th><th>操作</th></tr></thead>
<tbody id="feedback-tbody"></tbody>
</table>
<div class="empty hidden" id="feedback-empty">暂无反馈数据</div>
</div>

<div id="tab-analytics" class="hidden">
<div class="toolbar">
<select id="analytics-project"><option value="">全部项目</option><option value="bank-rec">银行对账工具</option><option value="tax-tool">个税决策对比工具</option><option value="tax-calc">税金计算器</option><option value="fin-report">财务报表数据分析</option><option value="cn-football-sim">国足世界杯闯关模拟器</option><option value="cash-flow">现金流量表</option></select>
<select id="analytics-days"><option value="7">最近 7 天</option><option value="14">最近 14 天</option><option value="30">最近 30 天</option></select>
</div>

<!-- Event Distribution -->
<div class="chart-wrap">
<h2>事件分布</h2>
<div class="legend" id="dist-legend"></div>
<div id="event-dist"></div>
</div>

<!-- Funnel -->
<div class="chart-wrap">
<h2>操作漏斗</h2>
<div id="funnel-chart"></div>
</div>

<!-- Daily Trend -->
<div class="chart-wrap">
<h2>日趋势（按事件类型）</h2>
<div class="legend" id="trend-legend"></div>
<div style="overflow-x:auto">
<div style="display:flex;align-items:flex-end;gap:8px;height:220px;padding:0 8px;min-width:100%" id="daily-bars"></div>
<div style="display:flex;gap:8px;padding:4px 8px 0;min-width:100%" id="daily-labels"></div>
</div>
</div>

<!-- Metadata Insights -->
<div class="chart-wrap">
<h2>数据洞察</h2>
<div class="insights-grid" id="insights"></div>
</div>
</div>
</div>
</div>

<!-- Reply Modal -->
<div class="modal-overlay" id="reply-modal">
<div class="modal-box">
<h3>回复反馈</h3>
<div id="reply-detail" style="font-size:.85rem;color:var(--text2);margin-bottom:10px"></div>
<select id="reply-status" style="margin-bottom:8px;padding:6px 10px;border:1px solid var(--border);border-radius:6px;font-family:inherit;font-size:.85rem;width:100%">
<option value="open">待处理</option><option value="in_progress">处理中</option><option value="resolved">已解决</option><option value="closed">已关闭</option>
</select>
<textarea id="reply-content" placeholder="输入回复内容..."></textarea>
<div class="btns"><button class="btn-cancel" id="reply-cancel">取消</button><button class="btn-save" id="reply-save">保存</button></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ========== Config ==========
const SUPABASE_URL = 'https://dashboard.tianjiwantong.com.cn/api/supabase';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhyZXN6dmNscXhldGZ5aGNsZ3B3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMxMzU3MzYsImV4cCI6MjA5ODcxMTczNn0.zrHVe87P9DpsTWrkaClCnlr0yTz2rgmrwfHnOTwsb8A';
const ADMIN_PWD = 'gzh2026';

// ========== State ==========
let db = null;
let currentTab = 'overview';
let currentReplyId = null;
let feedbackCache = [];
let globalErrorCount = 0;
let loadingTab = null;

// ========== Error Handling ==========
function showError(msg) {
  globalErrorCount++;
  var banner = document.getElementById('error-banner');
  var msgEl = document.getElementById('err-msg');
  msgEl.textContent = msg;
  banner.classList.add('show');
}
function clearError() {
  var banner = document.getElementById('error-banner');
  banner.classList.remove('show');
  globalErrorCount = 0;
}
document.getElementById('err-retry').addEventListener('click', function() {
  clearError();
  if (currentTab === 'overview') loadOverview();
  else if (currentTab === 'feedbacks') loadFeedbacks();
  else if (currentTab === 'analytics') loadAnalytics();
});

function checkDB() {
  if (!db) return false;
  return true;
}
function queryOK(r) { return r && !r.error; }
function val(v, fallback) { return (v !== null && v !== undefined) ? v : fallback; }

// ========== Login ==========
function initDB() {
  if (typeof supabase === 'undefined' || !supabase.createClient) {
    document.getElementById('login-msg').textContent = 'Supabase SDK 加载失败，请检查网络';
    return false;
  }
  db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  return true;
}

if (sessionStorage.getItem('fb_admin')) {
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('main-page').classList.remove('hidden');
  if (initDB()) loadOverview();
  else showError('Supabase SDK 加载失败，请刷新页面后重试');
}

document.getElementById('login-btn').addEventListener('click', function() {
  var pwd = document.getElementById('login-pwd').value;
  var msg = document.getElementById('login-msg');
  if (pwd === ADMIN_PWD) {
    sessionStorage.setItem('fb_admin', '1');
    document.getElementById('login-page').classList.add('hidden');
    document.getElementById('main-page').classList.remove('hidden');
    if (initDB()) loadOverview();
    else showError('Supabase SDK 加载失败，请刷新页面后重试');
  } else {
    msg.textContent = '密码错误';
  }
});

document.getElementById('login-pwd').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('login-btn').click();
});

document.getElementById('logout-btn').addEventListener('click', function() {
  sessionStorage.removeItem('fb_admin');
  location.reload();
});

// ========== Tabs ==========
document.querySelectorAll('.tabs button').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.tabs button').forEach(function(b) { b.classList.remove('active'); });
    this.classList.add('active');
    currentTab = this.dataset.tab;
    document.querySelectorAll('[id^="tab-"]').forEach(function(el) { el.classList.add('hidden'); });
    document.getElementById('tab-' + currentTab).classList.remove('hidden');
    if (currentTab === 'overview') loadOverview();
    else if (currentTab === 'feedbacks') loadFeedbacks();
    else if (currentTab === 'analytics') loadAnalytics();
  });
});

// ========== Overview ==========
async function loadOverview() {
  if (!checkDB()) { showError('数据库未连接，请刷新页面'); return; }
  clearError();
  var cards = document.getElementById('overview-cards');
  var recent = document.getElementById('recent-feedbacks');
  var projects = ['bank-rec', 'tax-tool', 'tax-calc', 'fin-report', 'cn-football-sim', 'cash-flow'];
  var names = { 'bank-rec': '银行对账工具', 'tax-tool': '个税决策对比工具', 'tax-calc': '税金计算器', 'fin-report': '财务报表数据分析', 'cn-football-sim': '国足世界杯闯关模拟器', 'cash-flow': '现金流量表' };

  // Show skeleton loading
  cards.innerHTML = projects.map(function(p) {
    return '<div class="card"><div class="name">' + names[p] + '</div><div class="value"><span class="skel" style="width:60px;height:1.8rem"></span></div><div class="sub"><span class="skel" style="width:140px;height:0.85rem"></span></div></div>';
  }).join('');
  recent.innerHTML = '<div class="loading">加载中...</div>';

  var errorCount = 0;
  var cardsHtml = '';
  for (var i = 0; i < projects.length; i++) {
    var p = projects[i];
    try {
      var fbR = await db.from('feedbacks').select('*', { count: 'exact', head: true }).eq('project', p);
      var evR = await db.from('usage_events').select('*', { count: 'exact', head: true }).eq('project', p);
      var lr = await db.from('feedbacks').select('created_at').eq('project', p).order('created_at', { ascending: false }).limit(1).maybeSingle();
      var er = await db.from('usage_events').select('created_at').eq('project', p).order('created_at', { ascending: false }).limit(1).maybeSingle();
      var hasFbErr = !queryOK(fbR) || !queryOK(lr);
      var hasEvErr = !queryOK(evR) || !queryOK(er);
      if (hasFbErr || hasEvErr) errorCount++;

      var fbCount = val(fbR.count, 0);
      var evCount = val(evR.count, 0);
      var last = lr.data || er.data;
      var lastStr = last ? new Date(last.created_at).toLocaleString('zh-CN') : '暂无';

      cardsHtml += '<div class="card' + (hasFbErr && hasEvErr ? ' error' : '') + '"><div class="name">' + names[p] + '</div><div class="value">' + fbCount + ' <span style="font-size:.85rem;font-weight:400;color:var(--text2)">条反馈</span></div><div class="sub">' + evCount + ' 次事件 | 最近: ' + lastStr + '</div></div>';
    } catch(e) {
      errorCount++;
      cardsHtml += '<div class="card error"><div class="name">' + names[p] + '</div><div class="value">查询失败</div><div class="sub">请检查数据库连接</div></div>';
    }
  }
  cards.innerHTML = cardsHtml;

  try {
    var recentR = await db.from('feedbacks').select('*').order('created_at', { ascending: false }).limit(5);
    if (!queryOK(recentR)) throw new Error(recentR.error ? recentR.error.message : '查询失败');
    if (recentR.data && recentR.data.length > 0) {
      var typeMap = { bug: 'Bug', feature: '功能建议', improvement: '改进', other: '其他' };
      recent.innerHTML = recentR.data.map(function(f) {
        return '<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center"><div><strong>' + esc(f.title) + '</strong> <span style="font-size:.75rem;color:var(--text3)">[' + (names[f.project]||f.project) + '] [' + (typeMap[f.type]||f.type) + ']</span></div><div style="font-size:.75rem;color:var(--text3)">' + new Date(f.created_at).toLocaleDateString('zh-CN') + '</div></div>';
      }).join('');
    } else {
      recent.innerHTML = '<div class="empty">暂无反馈</div>';
    }
  } catch(e) {
    errorCount++;
    recent.innerHTML = '<div class="empty">加载失败</div>';
  }

  if (errorCount > 0) showError('部分数据加载失败（' + errorCount + ' 项），请检查数据库状态');
}

// ========== Feedbacks ==========
async function loadFeedbacks() {
  if (!checkDB()) { showError('数据库未连接，请刷新页面'); return; }
  clearError();
  var tbody = document.getElementById('feedback-tbody');
  var empty = document.getElementById('feedback-empty');
  tbody.innerHTML = '<tr><td colspan="6" class="loading">加载中...</td></tr>';
  empty.classList.add('hidden');

  try {
    var q = db.from('feedbacks').select('*').order('created_at', { ascending: false });
    var fp = document.getElementById('filter-project').value;
    var ft = document.getElementById('filter-type').value;

  } catch(e) {
    tbody.innerHTML = '';

    empty.textContent = '加载失败: ' + (e.message || '未知错误');
    showError('反馈列表加载失败，请检查数据库状态');
  }
}

async function loadAnalytics() {
  if (!checkDB()) { showError('数据库未连接，请刷新页面'); return; }
  clearError();
  var days = parseInt(document.getElementById('analytics-days').value);
  var project = document.getElementById('analytics-project').value;
  var since = new Date(Date.now() - days * 86400000).toISOString();

  // Show loading skeleton
  document.getElementById('event-dist').innerHTML = '<div class="loading">加载中...</div>';
  document.getElementById('funnel-chart').innerHTML = '<div class="loading">加载中...</div>';
  document.getElementById('daily-bars').innerHTML = '';
  document.getElementById('daily-labels').innerHTML = '';
  document.getElementById('insights').innerHTML = '';

  try {
    var q = db.from('usage_events').select('*').gte('created_at', since).order('created_at');
    if (project) q = q.eq('project', project);
    var result = await q.limit(5000);
    if (!queryOK(result)) throw new Error(result.error ? result.error.message : '查询失败');
    var events = result.data || [];

    var projectFilter = project ? [project] : ['bank-rec', 'tax-tool', 'tax-calc', 'fin-report', 'cn-football-sim', 'cash-flow'];

    renderEventDist(events, projectFilter);
    renderFunnel(events, projectFilter);
    renderDailyTrend(events, days, projectFilter);
    renderInsights(events, projectFilter);

    if (events.length === 0) {
      document.getElementById('event-dist').innerHTML += '<div class="empty" style="margin-top:8px">所选时间范围内暂无事件数据</div>';
    }
  } catch(e) {
    document.getElementById('event-dist').innerHTML = '<div class="empty">分析数据加载失败</div>';
    document.getElementById('funnel-chart').innerHTML = '<div class="empty">分析数据加载失败</div>';
    document.getElementById('daily-bars').innerHTML = '';
    document.getElementById('daily-labels').innerHTML = '';
    document.getElementById('insights').innerHTML = '';
    showError('分析数据加载失败: ' + (e.message || '未知错误'));
  }
}

function renderEventDist(events, projects) {
  var legend = document.getElementById('dist-legend');
  var dist = document.getElementById('event-dist');

  // Group by project → event type
  var allTypes = new Set();
  var groups = {};
  projects.forEach(function(p) {
    groups[p] = {};
  });
  events.forEach(function(e) {
    if (groups[e.project]) {
      groups[e.project][e.event] = (groups[e.project][e.event] || 0) + 1;
      allTypes.add(e.event);
    }
  });

  // Build legend
  var types = Array.from(allTypes);
  legend.innerHTML = types.map(function(t) {
    return '<span class="legend-item"><span class="legend-dot" style="background:' + (EVT_COLORS[t]||'#999') + '"></span>' + (EVT_NAMES[t]||t) + '</span>';
  }).join('');

  // Find max for scaling
  var maxCount = 1;
  projects.forEach(function(p) {
    types.forEach(function(t) {
      maxCount = Math.max(maxCount, groups[p][t] || 0);
    });
  });

  var names = { 'bank-rec': '银行对账工具', 'tax-tool': '个税决策对比工具', 'tax-calc': '税金计算器', 'fin-report': '财务报表数据分析', 'cn-football-sim': '国足世界杯闯关模拟器', 'cash-flow': '现金流量表' };
  var html = '';
  projects.forEach(function(p) {
    html += '<div class="hbar-wrap"><div class="title">' + (names[p] || p) + '</div>';
    types.forEach(function(t) {
      var count = groups[p][t] || 0;
      var w = maxCount > 0 ? Math.max(2, (count / maxCount) * 100) : 0;
      html += '<div class="hbar-row"><div class="hbar-label">' + (EVT_NAMES[t]||t) + '</div><div class="hbar-track"><div class="hbar-fill" style="width:' + w + '%;background:' + (EVT_COLORS[t]||'#999') + '">' + (count > 0 && w > 15 ? count : '') + '</div></div><div class="hbar-num">' + count + '</div></div>';
    });
    html += '</div>';
  });
  if (!html) html = '<div class="empty">暂无数据</div>';
  dist.innerHTML = html;
}

function renderFunnel(events, projects) {
  var funnel = document.getElementById('funnel-chart');
  var names = { 'bank-rec': '银行对账工具', 'tax-tool': '个税决策对比工具', 'tax-calc': '税金计算器', 'fin-report': '财务报表数据分析', 'cn-football-sim': '国足世界杯闯关模拟器', 'cash-flow': '现金流量表' };

  // Define funnel steps per project
  var funnels = {
    'bank-rec': ['page_view', 'file_upload', 'start_reconciliation', 'export_csv'],
    'tax-tool': ['page_view', 'select_scheme', 'complete_calc', 'calc_step3'],
    'tax-calc': ['page_view', 'search', 'calculate'],
    'fin-report': ['page_view', 'file_upload', 'start_extraction', 'complete_extraction', 'export_excel'],
    'cn-football-sim': ['page_view', 'choose_coach', 'choose_sponsor', 'pick_strategy', 'start_match', 'match_result'],
    'cash-flow': ['page_view', 'tool_loaded']
  };

  var html = '';
  projects.forEach(function(p) {
    var steps = funnels[p];
    if (!steps) return;
    // Count each step
    var counts = {};
    events.forEach(function(e) {
      if (e.project === p && steps.indexOf(e.event) >= 0) {
        counts[e.event] = (counts[e.event] || 0) + 1;
      }
    });
    var maxCount = Math.max(1, counts[steps[0]] || 1);

    html += '<div class="funnel"><div class="title" style="margin-bottom:8px">' + names[p] + '</div>';
    for (var i = 0; i < steps.length; i++) {
      var c = counts[steps[i]] || 0;
      var w = Math.max(3, (c / maxCount) * 100);
      var prevC = i > 0 ? (counts[steps[i-1]] || 0) : c;
      var rate = prevC > 0 ? Math.round(c / prevC * 100) : 0;
      html += '<div class="funnel-step"><div class="funnel-label">' + (EVT_NAMES[steps[i]]||steps[i]) + '</div><div class="funnel-bar-wrap"><div class="funnel-bar" style="width:' + w + '%;background:' + (EVT_COLORS[steps[i]]||'#999') + '">' + c + '</div></div></div>';
      if (i > 0) {
        html += '<div class="funnel-rate">\u2192 转化率 <span>' + rate + '%</span></div>';
      }
    }
    html += '</div>';
  });
  if (!html) html = '<div class="empty">暂无数据</div>';
  funnel.innerHTML = html;
}

function renderDailyTrend(events, days, projects) {
  var legendEl = document.getElementById('trend-legend');
  var barsEl = document.getElementById('daily-bars');
  var labelsEl = document.getElementById('daily-labels');

  // Build date keys
  var dateKeys = [];
  for (var i = 0; i < days; i++) {
    var d = new Date(Date.now() - (days - 1 - i) * 86400000);
    dateKeys.push({
      key: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'),
      label: (d.getMonth()+1) + '/' + d.getDate()
    });
  }

  // Determine which event types exist (excluding page_view for trend clarity — it dominates)
  var allTypes = new Set();
  events.forEach(function(e) { allTypes.add(e.event); });
  var trendTypes = Array.from(allTypes).filter(function(t) { return t !== 'page_view'; });
  // Always include page_view at the end for reference
  if (allTypes.has('page_view')) trendTypes.push('page_view');

  // Group: date → event type → count
  var dateMap = {};
  dateKeys.forEach(function(dk) { dateMap[dk.key] = {}; });
  events.forEach(function(e) {
    var d = new Date(e.created_at);
    var key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if (dateMap[key]) {
      dateMap[key][e.event] = (dateMap[key][e.event] || 0) + 1;
    }
  });

  // Legend
  legendEl.innerHTML = trendTypes.map(function(t) {
    return '<span class="legend-item"><span class="legend-dot" style="background:' + (EVT_COLORS[t]||'#999') + '"></span>' + (EVT_NAMES[t]||t) + '</span>';
  }).join('');

  // Find max for scaling
  var maxVal = 1;
  dateKeys.forEach(function(dk) {
    var sum = 0;
    trendTypes.forEach(function(t) { sum += (dateMap[dk.key] && dateMap[dk.key][t]) || 0; });
    maxVal = Math.max(maxVal, sum);
  });

  barsEl.innerHTML = dateKeys.map(function(dk) {
    var dayData = dateMap[dk.key] || {};
    return '<div class="day-group" style="flex:1">' +
      trendTypes.map(function(t) {
        var count = dayData[t] || 0;
        var h = maxVal > 0 ? Math.max(0, (count / maxVal) * 195) : 0;
        return '<div class="evt-bar" style="height:' + h + 'px;background:' + (EVT_COLORS[t]||'#999') + '"><div class="bar-tooltip">' + (EVT_NAMES[t]||t) + ': ' + count + '</div></div>';
      }).join('') +
    '</div>';
  }).join('');

  labelsEl.innerHTML = dateKeys.map(function(dk) {
    return '<div class="day-label" style="flex:1">' + dk.label + '</div>';
  }).join('');
}

function renderInsights(events, projects) {
  var insights = document.getElementById('insights');
  var html = '';

  projects.forEach(function(p) {
    var pe = events.filter(function(e) { return e.project === p; });
    if (pe.length === 0) return;

    if (p === 'bank-rec') {
      var names = { 'bank-rec': '银行对账工具' };
      // Avg bank/ledger rows from start_reconciliation
      var bankRows = [], ledgerRows = [];
      pe.forEach(function(e) {
        if (e.event === 'start_reconciliation' && e.metadata) {
          if (e.metadata.bankRows) bankRows.push(e.metadata.bankRows);
          if (e.metadata.ledgerRows) ledgerRows.push(e.metadata.ledgerRows);
        }
      });
      // File upload types
      var csvUploads = 0, excelUploads = 0;
      pe.forEach(function(e) {
        if (e.event === 'file_upload' && e.metadata && e.metadata.type) {
          if (e.metadata.type === 'csv') csvUploads++;
          else if (e.metadata.type === 'excel') excelUploads++;
        }
      });
      // Export count
      var exportCount = pe.filter(function(e) { return e.event === 'export_csv'; }).length;
      var avgExportMatch = 0;
      pe.forEach(function(e) {
        if (e.event === 'export_csv' && e.metadata && e.metadata.matchCount) {
          avgExportMatch += e.metadata.matchCount;
        }
      });
      if (exportCount > 0) avgExportMatch = Math.round(avgExportMatch / exportCount);

      html += '<div class="insight-card"><div class="i-val">' + (bankRows.length > 0 ? Math.round(bankRows.reduce(function(a,b){return a+b;},0)/bankRows.length) : '-') + '</div><div class="i-label">银行流水均行数</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + (ledgerRows.length > 0 ? Math.round(ledgerRows.reduce(function(a,b){return a+b;},0)/ledgerRows.length) : '-') + '</div><div class="i-label">账务明细均行数</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + csvUploads + ' / ' + excelUploads + '</div><div class="i-label">上传格式 (CSV/Excel)</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + exportCount + '</div><div class="i-label">导出次数</div><div class="i-detail">均匹配 ' + avgExportMatch + ' 条</div></div>';
    }

    if (p === 'tax-tool') {
      // Scheme preference
      var schemeA = 0, schemeB = 0;
      pe.forEach(function(e) {
        if (e.event === 'select_scheme' && e.metadata && e.metadata.scheme) {
          if (e.metadata.scheme === 'A' || e.metadata.scheme === 'a') schemeA++;
          else schemeB++;
        }
      });
      // Bonus & spouse stats
      var bonusYes = 0, bonusNo = 0, spouseYes = 0, spouseNo = 0;
      pe.forEach(function(e) {
        if (e.event === 'complete_calc' && e.metadata) {
          if (e.metadata.hasBonus === true || e.metadata.hasBonus === 'true') bonusYes++;
          else bonusNo++;
          if (e.metadata.spouseIncluded === true || e.metadata.spouseIncluded === 'true') spouseYes++;
          else spouseNo++;
        }
      });
      var totalScheme = schemeA + schemeB || 1;
      var totalCalc = bonusYes + bonusNo || 1;

      html += '<div class="insight-card"><div class="i-val">方案A ' + Math.round(schemeA/totalScheme*100) + '%</div><div class="i-label">计税方案偏好</div><div class="i-detail">A:' + schemeA + ' / B:' + schemeB + '</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + Math.round(bonusYes/totalCalc*100) + '%</div><div class="i-label">含年终奖比例</div><div class="i-detail">有:' + bonusYes + ' / 无:' + bonusNo + '</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + Math.round(spouseYes/totalCalc*100) + '%</div><div class="i-label">含配偶扣除比例</div><div class="i-detail">有:' + spouseYes + ' / 无:' + spouseNo + '</div></div>';

      var taxTypes = {};

        if (e.event === 'calculate' && e.metadata && e.metadata.taxType) {
          var tt = e.metadata.taxType;
          taxTypes[tt] = (taxTypes[tt] || 0) + 1;
        }

      Object.keys(taxTypes).forEach(function(k) {
        if (taxTypes[k] > topCount) { topCount = taxTypes[k]; topTax = k; }
      });

      var searchCount = pe.filter(function(e) { return e.event === 'search'; }).length;
      var filterCount = pe.filter(function(e) { return e.event === 'filter'; }).length;
      var totalCalc = calcCount || 1;
      var taxTypeNames = { pit:'个税', stamp:'印花税', consumption:'消费税', tariff:'关税', property:'房产税', deed:'契税', vehicle_purchase:'车辆购置税', farmland:'耕地占用税', resource:'资源税', vehicle:'车船税', environment:'环保税', tonnage:'船舶吨税', land_vat:'土地增值税', tobacco:'烟叶税', land_use:'城镇土地使用税', cit:'企业所得税', vat:'增值税', surtax:'附加税费' };

      html += '<div class="insight-card"><div class="i-val">' + calcCount + '</div><div class="i-label">计算总次数</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + searchCount + '</div><div class="i-label">搜索次数</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + filterCount + '</div><div class="i-label">分类筛选次数</div></div>';

      }
    }

    if (p === 'fin-report') {
      // Extraction stats

      var completeCount = pe.filter(function(e) { return e.event === 'complete_extraction'; }).length;
      var exportCount = pe.filter(function(e) { return e.event === 'export_excel'; }).length;
      var uploadCount = pe.filter(function(e) { return e.event === 'file_upload'; }).length;
      // Model counts from start_extraction
      var modelCounts = { 1: 0, 2: 0, 3: 0 };
      pe.forEach(function(e) {
        if (e.event === 'start_extraction' && e.metadata && e.metadata.modelCount) {
          modelCounts[e.metadata.modelCount] = (modelCounts[e.metadata.modelCount] || 0) + 1;
        }
      });
      var totalExtraction = extractionCount || 1;
      var successRate = extractionCount > 0 ? Math.round(completeCount / extractionCount * 100) : 0;

      html += '<div class="insight-card"><div class="i-val">' + uploadCount + '</div><div class="i-label">PDF上传次数</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + extractionCount + '</div><div class="i-label">提取次数</div><div class="i-detail">成功率 ' + successRate + '%</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + exportCount + '</div><div class="i-label">Excel导出次数</div></div>';

    if (p === 'cn-football-sim') {

      var itemBuys = pe.filter(function(e) { return e.event === 'buy_item'; }).length;
      var restartCount = pe.filter(function(e) { return e.event === 'restart_game'; }).length;

      pe.forEach(function(e) {

          tacticCounts[e.metadata.tactic] = (tacticCounts[e.metadata.tactic] || 0) + 1;

      });
      resultEvents.forEach(function(e) {
        if (!e.metadata || !e.metadata.outcome) return;
        if (e.metadata.outcome === 'win') winCount++;
        else if (e.metadata.outcome === 'draw') drawCount++;
        else if (e.metadata.outcome === 'loss') lossCount++;
      });

      var topTactic = '';
      var topTacticCount = 0;
      Object.keys(tacticCounts).forEach(function(k) {
        if (tacticCounts[k] > topTacticCount) {
          topTactic = k;
          topTacticCount = tacticCounts[k];
        }
      });
      var tacticNames = { defend: '死守', balanced: '均衡', press: '高压', allin: '梭哈' };

      html += '<div class="insight-card"><div class="i-val">' + startCount + '</div><div class="i-label">开赛次数</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + winCount + ' / ' + drawCount + ' / ' + lossCount + '</div><div class="i-label">胜 / 平 / 负</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + itemBuys + '</div><div class="i-label">道具购买次数</div></div>';
      html += '<div class="insight-card"><div class="i-val">' + (topTactic ? (tacticNames[topTactic] || topTactic) : '-') + '</div><div class="i-label">最常用战术</div><div class="i-detail">重开 ' + restartCount + ' 次</div></div>';
    }
  });

  if (!html) html = '<div style="grid-column:1/-1" class="empty">暂无足够数据</div>';
  insights.innerHTML = html;
}

document.getElementById('analytics-project').addEventListener('change', loadAnalytics);
document.getElementById('analytics-days').addEventListener('change', loadAnalytics);

function esc(s) {
  var d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}
</script>
